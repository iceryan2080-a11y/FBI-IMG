server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
    # el navegador pega a /api/... y nginx reenvía al backend
    location /api/ {
        proxy_pass http://backend:8000/;
        client_max_body_size 20M;
        proxy_read_timeout 120s;
    }
}
